version: 0.2
  
phases:
  install:
    runtime-versions:
      java: corretto21
      nodejs: 24
    commands:
      - npm install allure
      - allure --version

  build:
    commands:
      - ./gradlew test
  post_build:
    commands:
      - allure generate
      - aws s3 cp allure-report s3://$TESTREPORTS_BUCKET --recursive
